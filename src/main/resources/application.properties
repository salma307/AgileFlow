# =============================================================
# ATTENTION : Ce fichier application.properties est versionné
# uniquement pour les premières étapes de développement.
# Il NE contient actuellement aucune information sensible.
# Dès qu'une version stable sera atteinte, il sera retiré du dépôt
# (ajouté au .gitignore) et remplacé par un exemple sans secrets.
# =============================================================
spring.application.name=backend

server.port=8080
spring.datasource.url=jdbc:h2:file:./data/presencedb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.jpa.hibernate.ddl-auto=update

jwt.secret=thisIsASimpleButLongEnoughSecretKeyForJwtSigning12345
jwt.access.duration-ms=900000
jwt.refresh.duration-ms=604800000

# Parametres MFA simples pour OTP/challenge.
mfa.otp.duration-minutes=5
mfa.otp.max-attempts=5